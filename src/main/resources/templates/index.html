<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>国家图书馆书目 TXT</title>
    <style>
        :root {
            --bg: #0f1419;
            --card: #1a2332;
            --text: #e7ecf3;
            --muted: #8b9cb3;
            --accent: #3d8bfd;
            --error: #f87171;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "SF Pro Text", "Segoe UI", system-ui, sans-serif;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0 0 0.35rem;
            letter-spacing: -0.02em;
        }
        .hint {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: var(--text);
            font-size: 1rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61, 139, 253, 0.2);
        }
        button {
            width: 100%;
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(180deg, #4d9bff, var(--accent));
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { filter: brightness(1.08); }
        button:active { transform: scale(0.99); }
        .err {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            background: rgba(248, 113, 113, 0.12);
            color: var(--error);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>国家图书馆 · 书目 TXT</h1>
    <p class="hint">数据来自中国国家图书馆读者云门户（read.nlc.cn）「电子图书」检索。下载文件含首条命中的题名、作者、出版者与官方详情链接。图书正文需在国图平台在线阅读，本站不提供全文抓取。</p>
    <form method="post" th:action="@{/download}">
        <label for="title">书名或关键词</label>
        <input id="title" name="title" type="text" placeholder="例如：红楼梦" th:value="${title}"/>
        <button type="submit">生成并下载 TXT</button>
    </form>
    <div class="err" th:if="${error != null}" th:text="${error}"></div>
</div>
</body>
</html>
